    <path d="M -110 -160 L 110 -160 L 110 40 Q 110 130 0 130 Q -110 130 -110 40 Z"/>
    <ellipse cx="0" cy="-160" rx="110" ry="18"/>
    <!-- Ножка + подставка -->
    <rect x="-30" y="60" width="60" height="40"/>
    <rect x="-90" y="100" width="180" height="30" rx="4"/>
    <rect x="-70" y="130" width="140" height="20" rx="3"/>
  </g>
  <!-- MSG подпись внизу -->
  <text x="256" y="470" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="48" fill="#ffffff" letter-spacing="4">MSG</text>
